name: Analytics Poller

on:
  schedule:
    - cron: "0 10 * * 0"  # Sunday 10:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Write YouTube token
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          mkdir -p config
          echo "$YOUTUBE_TOKEN_JSON" > config/youtube_token.json
      - name: Run Analytics Poller
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_TOKEN_PATH: config/youtube_token.json
        run: python -m agents.performance.analytics_poller
