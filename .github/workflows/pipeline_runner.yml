name: Pipeline Runner

on:
  schedule:
    - cron: "0 * * * *"  # Every hour
  workflow_dispatch:
    inputs:
      jobs:
        description: "Which jobs to run"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - fast
          - slow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fast:
    name: Fast stages (topics → scripts → voiceover → thumbnails)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.jobs != 'slow' }}
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get install -y ffmpeg
      - run: pip install --retries 3 -r requirements.txt
      - name: Write YouTube token
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          mkdir -p config
          echo "$YOUTUBE_TOKEN_JSON" > config/youtube_token.json
      - name: Run fast pipeline stages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          YOUTUBE_TOKEN_PATH: config/youtube_token.json
          PIPELINE_STAGES: fast
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          REMOTION_REGION: ${{ secrets.REMOTION_REGION }}
        run: python -u -m agents.shared.pipeline_runner

  assemble:
    name: Video assembly (slow — extended timeout)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.jobs != 'fast' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install --retries 3 -r requirements.txt
      - name: Write YouTube token
        env:
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          mkdir -p config
          echo "$YOUTUBE_TOKEN_JSON" > config/youtube_token.json
      - name: Run video assembly + upload
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          YOUTUBE_TOKEN_PATH: config/youtube_token.json
          PIPELINE_STAGES: slow
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          REMOTION_REGION: ${{ secrets.REMOTION_REGION }}
          REMOTION_FUNCTION_NAME: ${{ secrets.REMOTION_FUNCTION_NAME }}
          REMOTION_SERVE_URL: ${{ secrets.REMOTION_SERVE_URL }}
        run: python -u -m agents.shared.pipeline_runner
